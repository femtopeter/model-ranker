<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Model Ranker">
<meta name="theme-color" content="#0a0f1c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪂</text></svg>">
<title>🪂 Model Ranker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a0f1c;
    --bg-mid: #0d1528;
    --bg-card: rgba(15,23,42,0.4);
    --bg-card-active: rgba(30,41,59,0.8);
    --border: #1e293b;
    --border-accent: rgba(100,160,255,0.08);
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-muted: #64748b;
    --text-dark: #475569;
    --green: #4ade80;
    --green-dim: #86efac;
    --green-bg: rgba(34,197,94,0.08);
    --blue: #3b82f6;
    --purple: #a78bfa;
    --red: #f87171;
    --red-bg: rgba(239,68,68,0.1);
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; }
  body {
    min-height: 100%;
    background: linear-gradient(145deg, var(--bg-deep) 0%, var(--bg-mid) 40%, #111d35 100%);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
    overscroll-behavior: none;
  }
  .header {
    padding: 20px 20px 16px;
    padding-top: calc(20px + var(--safe-top));
    border-bottom: 1px solid var(--border-accent);
    background: linear-gradient(180deg, rgba(30,80,180,0.08) 0%, transparent 100%);
  }
  .header-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .header-icon { font-size: 26px; }
  .header h1 {
    font-size: 22px; font-weight: 700; margin: 0;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header p { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .section { padding: 16px 16px 8px; }
  .section-label {
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px;
  }
  .presets { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .preset-btn {
    padding: 7px 13px; border-radius: 20px;
    border: 1px solid var(--border);
    background: rgba(15,23,42,0.6);
    color: var(--text-dim); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; font-family: var(--sans);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .preset-btn:active { transform: scale(0.96); }
  .preset-btn.active {
    border-color: var(--blue); background: rgba(59,130,246,0.15); color: #93c5fd;
  }
  .coord-row {
    display: flex; gap: 8px; align-items: center;
    padding: 10px 12px; border-radius: 12px;
    background: rgba(15,23,42,0.5); border: 1px solid var(--border);
  }
  .coord-input {
    flex: 1; padding: 10px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg-deep);
    color: var(--text); font-size: 14px; font-family: var(--mono);
    outline: none; transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .coord-input:focus { border-color: var(--blue); }
  .go-btn {
    padding: 10px 20px; border-radius: 8px;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    border: none; color: white; font-size: 14px; font-weight: 600;
    cursor: pointer; white-space: nowrap; font-family: var(--sans);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .go-btn:active { transform: scale(0.96); }
  .go-btn:disabled { background: #334155; cursor: not-allowed; }
  .error-box {
    margin: 12px 16px; padding: 12px 14px; border-radius: 10px;
    background: var(--red-bg); border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5; font-size: 13px;
  }
  .progress-wrap { padding: 24px 16px; text-align: center; }
  .progress-bar {
    width: 100%; height: 4px; background: var(--border);
    border-radius: 2px; overflow: hidden; margin-bottom: 12px;
  }
  .progress-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--blue), var(--purple));
    transition: width 0.3s;
  }
  .results { padding: 12px 16px; padding-bottom: calc(80px + var(--safe-bottom)); }
  .hero {
    padding: 18px; border-radius: 14px;
    background: linear-gradient(135deg, var(--green-bg), rgba(59,130,246,0.08));
    border: 1px solid rgba(34,197,94,0.2); margin-bottom: 16px;
  }
  .hero-label {
    font-size: 11px; color: var(--green); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px;
  }
  .hero-name { font-size: 20px; font-weight: 700; color: #f0fdf4; margin-bottom: 2px; }
  .hero-sub { font-size: 12px; color: var(--green-dim); }
  .hero-metrics { display: flex; gap: 16px; margin-top: 14px; flex-wrap: wrap; }
  .hero-metric-label { color: var(--text-muted); font-size: 12px; display: block; }
  .hero-metric-val { font-size: 16px; font-weight: 600; color: var(--text); font-family: var(--mono); }
  .hero-metric-unit { font-size: 11px; color: var(--text-muted); }
  .hero-note { font-size: 11px; color: var(--text-dark); margin-top: 10px; }

  .model-card {
    padding: 12px 14px; border-radius: 12px;
    background: var(--bg-card); border: 1px solid var(--border);
    margin-bottom: 6px; cursor: pointer; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .model-card:active { transform: scale(0.99); }
  .model-card.rank1 { border-color: rgba(34,197,94,0.2); }
  .model-card.expanded { background: var(--bg-card-active); }
  .model-row { display: flex; align-items: center; gap: 10px; }
  .rank-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 50%; font-weight: 700; flex-shrink: 0;
  }
  .rank-1 { background: #FFD700; font-size: 16px; }
  .rank-2 { background: #C0C0C0; font-size: 16px; }
  .rank-3 { background: #CD7F32; font-size: 16px; }
  .rank-other { background: #1e2a3a; color: #888; font-size: 13px; border: 1px solid #334155; }
  .model-info { flex: 1; min-width: 0; }
  .model-name { font-size: 14px; font-weight: 600; }
  .model-name.has-data { color: var(--text); }
  .model-name.no-data { color: var(--text-dark); }
  .model-tag { font-size: 10px; color: #8b5cf6; margin-left: 6px; font-weight: 500; }
  .model-sub { font-size: 11px; color: var(--text-dark); margin-top: 1px; }
  .model-rmse { text-align: right; flex-shrink: 0; }
  .model-rmse-val { font-size: 13px; font-weight: 600; font-family: var(--mono); color: var(--text); }
  .model-rmse-unit { font-size: 10px; color: var(--text-muted); }
  .model-error { font-size: 11px; flex-shrink: 0; }
  .score-bar { width: 100%; height: 6px; background: #1e2a3a; border-radius: 3px; overflow: hidden; margin-top: 8px; }
  .score-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease-out; }
  .detail-grid {
    margin-top: 12px; padding-top: 12px;
    border-top: 1px solid var(--border-accent);
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 12px; font-size: 12px;
  }
  .detail-label { color: var(--text-muted); font-size: 10px; margin-bottom: 2px; }
  .detail-val { font-family: var(--mono); font-weight: 500; }
  .detail-note { grid-column: 1 / -1; font-size: 11px; color: var(--text-dark); }
  .method-box {
    margin-top: 16px; padding: 12px 14px; border-radius: 12px;
    background: rgba(15,23,42,0.3); border: 1px solid var(--border);
    font-size: 11px; color: var(--text-dark); line-height: 1.6;
  }
  .method-title { font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
  .empty-state { padding: 48px 24px; text-align: center; color: var(--text-dark); font-size: 14px; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .timestamp { font-size: 11px; color: var(--text-dark); text-align: center; margin-top: 12px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <span class="header-icon">🪂</span>
    <h1>Model Ranker</h1>
  </div>
  <p>Welches Prognosemodell trifft aktuell den Wind am besten?</p>
</div>

<div class="section">
  <div class="section-label">Fluggebiet wählen</div>
  <div class="presets" id="presets"></div>
  <div class="coord-row">
    <input type="text" class="coord-input" id="coordInput" inputmode="decimal"
      placeholder="z.B. 46.6863, 7.8528" autocomplete="off" autocorrect="off">
    <button class="go-btn" id="goBtn" onclick="handleGo()">Go</button>
  </div>
</div>

<div id="errorBox" class="error-box" style="display:none"></div>
<div id="progressWrap" class="progress-wrap" style="display:none">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <p style="color:#94a3b8;font-size:13px" id="progressStatus"></p>
  <p style="color:#475569;font-size:11px;margin-top:4px" id="progressCount"></p>
</div>
<div id="results" class="results" style="display:none"></div>
<div id="emptyState" class="empty-state">
  <div class="empty-icon">🌬️</div>
  Wähle ein Fluggebiet um die Modelle zu vergleichen
</div>

<script>
// ---- Models ----
const ALL_MODELS = [
  { id:"ecmwf_ifs025", name:"ECMWF IFS 0.25°", resolution:"25 km", provider:"ECMWF", scope:"global", update:"6h" },
  { id:"ecmwf_ifs", name:"ECMWF IFS HRES", resolution:"9 km", provider:"ECMWF", scope:"global", update:"6h" },
  { id:"ecmwf_aifs025", name:"ECMWF AIFS", resolution:"25 km", provider:"ECMWF", scope:"global", update:"6h", note:"AI" },
  { id:"icon_global", name:"ICON Global", resolution:"11 km", provider:"DWD", scope:"global", update:"6h" },
  { id:"gfs_global", name:"GFS Global", resolution:"25 km", provider:"NOAA", scope:"global", update:"6h" },
  { id:"gem_global", name:"GEM Global", resolution:"25 km", provider:"ECCC", scope:"global", update:"12h" },
  { id:"ukmo_global_deterministic_10km", name:"UKMO Global", resolution:"10 km", provider:"UK Met Office", scope:"global", update:"6h" },
  { id:"icon_eu", name:"ICON-EU", resolution:"7 km", provider:"DWD", scope:"europe", bounds:{latMin:29,latMax:70,lonMin:-23,lonMax:45}, update:"3h" },
  { id:"icon_d2", name:"ICON-D2", resolution:"2 km", provider:"DWD", scope:"central_europe", bounds:{latMin:43,latMax:58,lonMin:2,lonMax:20}, update:"3h" },
  { id:"meteofrance_arpege_europe", name:"ARPEGE Europe", resolution:"11 km", provider:"Météo-France", scope:"europe", bounds:{latMin:20,latMax:72,lonMin:-32,lonMax:42}, update:"6h" },
  { id:"meteofrance_arome_france", name:"AROME France", resolution:"1.3 km", provider:"Météo-France", scope:"france", bounds:{latMin:38,latMax:53,lonMin:-8,lonMax:12}, update:"3h" },
  { id:"meteofrance_arome_france_hd", name:"AROME France HD", resolution:"1 km", provider:"Météo-France", scope:"france", bounds:{latMin:38,latMax:53,lonMin:-8,lonMax:12}, update:"3h" },
  { id:"meteoswiss_icon_ch1", name:"MeteoSwiss ICON-CH1", resolution:"1 km", provider:"MeteoSwiss", scope:"switzerland", bounds:{latMin:45.5,latMax:48.2,lonMin:5.5,lonMax:11}, update:"3h" },
  { id:"meteoswiss_icon_ch2", name:"MeteoSwiss ICON-CH2", resolution:"2 km", provider:"MeteoSwiss", scope:"switzerland", bounds:{latMin:44,latMax:49,lonMin:4,lonMax:12}, update:"3h" },
  { id:"knmi_harmonie_arome_europe", name:"KNMI HARMONIE", resolution:"5.5 km", provider:"KNMI", scope:"europe", bounds:{latMin:35,latMax:65,lonMin:-15,lonMax:30}, update:"6h" },
  { id:"dmi_harmonie_arome_europe", name:"DMI HARMONIE", resolution:"5.5 km", provider:"DMI", scope:"europe", bounds:{latMin:35,latMax:65,lonMin:-15,lonMax:30}, update:"6h" },
  { id:"metno_nordic", name:"MET Norway Nordic", resolution:"1 km", provider:"MET Norway", scope:"nordic", bounds:{latMin:53,latMax:72,lonMin:-1,lonMax:40}, update:"1h" },
  { id:"arpae_cosmo_2i", name:"ItaliaMeteo ICON-2I", resolution:"2 km", provider:"ItaliaMeteo", scope:"italy", bounds:{latMin:35,latMax:48,lonMin:5,lonMax:21}, update:"3h" },
  { id:"geosphere_arome", name:"GeoSphere AROME", resolution:"2.5 km", provider:"GeoSphere Austria", scope:"austria", bounds:{latMin:44,latMax:50,lonMin:8,lonMax:19}, update:"3h" },
];

const PRESETS = [
  { name:"Interlaken", lat:46.68, lon:7.85, c:"CH" },
  { name:"Fiesch", lat:46.40, lon:8.13, c:"CH" },
  { name:"Engelberg", lat:46.82, lon:8.40, c:"CH" },
  { name:"Davos", lat:46.80, lon:9.84, c:"CH" },
  { name:"Verbier", lat:46.10, lon:7.23, c:"CH" },
  { name:"Annecy", lat:45.90, lon:6.13, c:"FR" },
  { name:"Chamonix", lat:45.92, lon:6.87, c:"FR" },
  { name:"Kössen", lat:47.67, lon:12.40, c:"AT" },
  { name:"Stubaital", lat:47.08, lon:11.31, c:"AT" },
  { name:"Brixen", lat:46.72, lon:11.66, c:"IT" },
  { name:"Bassano", lat:45.77, lon:11.73, c:"IT" },
  { name:"Ölüdeniz", lat:36.55, lon:29.12, c:"TR" },
  { name:"Leutasch", lat:47.37, lon:11.14, c:"AT" },
  { name:"Meduno", lat:46.22, lon:12.80, c:"IT" },
];

const FL = { CH:"🇨🇭", FR:"🇫🇷", AT:"🇦🇹", IT:"🇮🇹", TR:"🇹🇷" };
let currentAbort = null;

// ---- Init ----
const presetsEl = document.getElementById('presets');
PRESETS.forEach(p => {
  const b = document.createElement('button');
  b.className = 'preset-btn'; b.dataset.name = p.name;
  b.innerHTML = `<span style="font-size:11px;margin-right:3px">${FL[p.c]||'📍'}</span>${p.name}`;
  b.onclick = () => {
    document.querySelectorAll('.preset-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('coordInput').value = `${p.lat}, ${p.lon}`;
    runAnalysis(p.lat, p.lon, p.name);
  };
  presetsEl.appendChild(b);
});

document.getElementById('coordInput').addEventListener('keydown', e => { if (e.key === 'Enter') handleGo(); });

// ---- Helpers ----
function getModels(lat, lon) {
  return ALL_MODELS.filter(m => {
    if (m.scope === 'global') return true;
    if (m.bounds) return lat>=m.bounds.latMin && lat<=m.bounds.latMax && lon>=m.bounds.lonMin && lon<=m.bounds.lonMax;
    return false;
  });
}
function wdErr(f,o) { let d=Math.abs(f-o); return d>180?360-d:d; }
function computeMetrics(fc, gt) {
  if (!fc?.time || !gt?.time) return null;
  const om={}; gt.time.forEach((t,i) => { om[t]={ws:gt.wind_speed_10m?.[i], wd:gt.wind_direction_10m?.[i], wg:gt.wind_gusts_10m?.[i]}; });
  let sE=[],dE=[],gE=[],n=0;
  fc.time.forEach((t,i) => {
    const o=om[t]; if(!o) return;
    const fs=fc.wind_speed_10m?.[i], fd=fc.wind_direction_10m?.[i], fg=fc.wind_gusts_10m?.[i];
    if(fs!=null&&o.ws!=null&&!isNaN(fs)&&!isNaN(o.ws)) sE.push((fs-o.ws)**2);
    if(fd!=null&&o.wd!=null&&!isNaN(fd)&&!isNaN(o.wd)) dE.push(wdErr(fd,o.wd)**2);
    if(fg!=null&&o.wg!=null&&!isNaN(fg)&&!isNaN(o.wg)) gE.push((fg-o.wg)**2);
    n++;
  });
  if(n<2) return null;
  const r=a=>a.length>0?Math.sqrt(a.reduce((x,y)=>x+y,0)/a.length):null;
  const sR=r(sE),dR=r(dE),gR=r(gE);
  let c=0,w=0;
  if(sR!=null){c+=sR*0.4;w+=0.4;} if(gR!=null){c+=gR*0.15;w+=0.15;} if(dR!=null){c+=(dR/10)*0.45;w+=0.45;}
  return {speedRMSE:sR,dirRMSE:dR,gustRMSE:gR,score:w>0?c/w:null,matched:n};
}
function parseCoords(input) {
  const c=input.trim().replace(/[()]/g,'').trim();
  const m=c.match(/^([+-]?\d+\.?\d*)[,\s]+([+-]?\d+\.?\d*)$/);
  if(!m) return null;
  const lat=parseFloat(m[1]),lon=parseFloat(m[2]);
  if(isNaN(lat)||isNaN(lon)||lat<-90||lat>90||lon<-180||lon>180) return null;
  return {lat,lon};
}

// ---- API ----
async function fetchJSON(url) {
  const r=await fetch(url); if(!r.ok) throw new Error(`HTTP ${r.status}`);
  const d=await r.json(); if(d.error) throw new Error(d.reason||'API error'); return d;
}
async function fetchGT(lat,lon) {
  return (await fetchJSON(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m&past_hours=24&forecast_hours=0&wind_speed_unit=kmh&timezone=auto`)).hourly;
}
async function fetchModel(lat,lon,id) {
  try {
    const d=await fetchJSON(`https://previous-runs-api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=wind_speed_10m_previous_day1,wind_direction_10m_previous_day1,wind_gusts_10m_previous_day1&models=${id}&past_hours=24&forecast_hours=0&wind_speed_unit=kmh&timezone=auto`);
    const h=d.hourly;
    if(h?.time && h.wind_speed_10m_previous_day1?.some(v=>v!=null))
      return {time:h.time, wind_speed_10m:h.wind_speed_10m_previous_day1, wind_direction_10m:h.wind_direction_10m_previous_day1, wind_gusts_10m:h.wind_gusts_10m_previous_day1};
  } catch(_){}
  const d=await fetchJSON(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m&models=${id}&past_hours=24&forecast_hours=0&wind_speed_unit=kmh&timezone=auto`);
  if(!d.hourly?.time||!d.hourly.wind_speed_10m?.some(v=>v!=null)) throw new Error('No data');
  return d.hourly;
}

// ---- UI ----
function showErr(m){const e=document.getElementById('errorBox');e.textContent=m;e.style.display='block';}
function hideErr(){document.getElementById('errorBox').style.display='none';}
function showProg(s,d,t){
  document.getElementById('progressWrap').style.display='block';
  document.getElementById('progressFill').style.width=`${(d/Math.max(t,1))*100}%`;
  document.getElementById('progressStatus').textContent=s;
  document.getElementById('progressCount').textContent=`${d} / ${t} Modelle`;
}
function hideProg(){document.getElementById('progressWrap').style.display='none';}

function renderResults(res, loc) {
  const el=document.getElementById('results');
  const ranked=res.filter(r=>r.m);
  const mx=ranked.length>0?Math.max(...ranked.map(r=>r.m.score),1):1;
  const best=ranked[0];
  const now=new Date().toLocaleString('de-CH',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  let h='';

  if(best){
    const m=best.m;
    h+=`<div class="hero">
      <div class="hero-label">✦ Bestes Modell für ${loc}</div>
      <div class="hero-name">${best.model.name}</div>
      <div class="hero-sub">${best.model.provider} · ${best.model.resolution} · Update alle ${best.model.update}</div>
      <div class="hero-metrics">
        <div><span class="hero-metric-label">Wind</span><div class="hero-metric-val">${m.speedRMSE?.toFixed(1)??'–'} <span class="hero-metric-unit">km/h</span></div></div>
        <div><span class="hero-metric-label">Richtung</span><div class="hero-metric-val">${m.dirRMSE?.toFixed(0)??'–'}<span class="hero-metric-unit">°</span></div></div>
        <div><span class="hero-metric-label">Böen</span><div class="hero-metric-val">${m.gustRMSE?.toFixed(1)??'–'} <span class="hero-metric-unit">km/h</span></div></div>
      </div>
      <div class="hero-note">${m.matched} Vergleichspunkte (letzte 24h)</div>
    </div>`;
  }

  h+=`<div class="section-label">Ranking — ${ranked.length} von ${res.length} Modellen</div>`;

  res.forEach(r => {
    const rank=r.m?ranked.indexOf(r)+1:null;
    const rc=rank&&rank<=3?`rank-${rank}`:'rank-other';
    const rl=rank?(rank<=3?['🥇','🥈','🥉'][rank-1]:rank):'—';
    const cc=`model-card${rank===1?' rank1':''}`;
    const pct=r.m?Math.min((r.m.score/mx)*100,100):0;
    const hue=Math.max(0,120-pct*1.2);

    h+=`<div class="${cc}" id="card-${r.model.id}" onclick="toggle('${r.model.id}')">
      <div class="model-row">
        <span class="rank-badge ${rc}">${rl}</span>
        <div class="model-info">
          <div class="model-name ${r.m?'has-data':'no-data'}">${r.model.name}${r.model.note?`<span class="model-tag">${r.model.note}</span>`:''}</div>
          <div class="model-sub">${r.model.provider} · ${r.model.resolution}</div>
        </div>
        ${r.m?`<div class="model-rmse"><div class="model-rmse-val">${r.m.speedRMSE?.toFixed(1)??'–'}</div><div class="model-rmse-unit">km/h RMSE</div></div>`:''}
        ${!r.m&&r.err?`<div class="model-error" style="color:var(--red)">Fehler</div>`:''}
        ${!r.m&&!r.err?`<div class="model-error" style="color:var(--text-dark)">—</div>`:''}
      </div>
      ${r.m?`<div class="score-bar"><div class="score-fill" style="width:${pct}%;background:hsl(${hue},70%,50%)"></div></div>`:''}
      <div class="detail-grid" id="det-${r.model.id}" style="display:none">
        ${r.m?`
          <div><div class="detail-label">Wind</div><div class="detail-val">${r.m.speedRMSE?.toFixed(2)??'–'} km/h</div></div>
          <div><div class="detail-label">Richtung</div><div class="detail-val">${r.m.dirRMSE?.toFixed(1)??'–'}°</div></div>
          <div><div class="detail-label">Böen</div><div class="detail-val">${r.m.gustRMSE?.toFixed(2)??'–'} km/h</div></div>
          <div class="detail-note">${r.m.matched} Punkte · Update: ${r.model.update}</div>
        `:''}
        ${r.err?`<div class="detail-note" style="color:var(--red)">${r.err}</div>`:''}
      </div>
    </div>`;
  });

  h+=`<div class="method-box">
    <div class="method-title">Methodik</div>
    Ground Truth: Open-Meteo "Best Match" (assimiliert, nahe an Messwerten).<br>
    Prognose: Previous Day 1 je Modell (Fallback: aktuelle Modell-Daten).<br>
    Score: Gewichteter RMSE — Wind 40%, Richtung 45%, Böen 15%.<br>
    Quelle: Open-Meteo API · kostenlos · kein Key.
  </div>`;
  h+=`<div class="timestamp">Stand: ${now}</div>`;

  el.innerHTML=h; el.style.display='block';
}

function toggle(id) {
  const d=document.getElementById('det-'+id);
  if(!d)return;
  d.style.display=d.style.display==='none'?'grid':'none';
  document.getElementById('card-'+id)?.classList.toggle('expanded');
}

// ---- Main ----
async function runAnalysis(lat,lon,loc) {
  if(currentAbort) currentAbort.abort();
  const ctrl=new AbortController(); currentAbort=ctrl;
  hideErr();
  document.getElementById('results').style.display='none';
  document.getElementById('emptyState').style.display='none';
  document.getElementById('goBtn').disabled=true;

  try {
    showProg('Ground-Truth laden…',0,1);
    const gt=await fetchGT(lat,lon);
    if(ctrl.signal.aborted) return;

    const models=getModels(lat,lon);
    const res=[];
    for(let i=0;i<models.length;i++){
      if(ctrl.signal.aborted) return;
      showProg(`${models[i].name}…`,i+1,models.length);
      try {
        const fc=await fetchModel(lat,lon,models[i].id);
        res.push({model:models[i], m:computeMetrics(fc,gt), err:null});
      } catch(e) {
        res.push({model:models[i], m:null, err:e.message});
      }
      await new Promise(r=>setTimeout(r,80));
    }
    if(ctrl.signal.aborted) return;
    res.sort((a,b)=>{if(!a.m&&!b.m)return 0;if(!a.m)return 1;if(!b.m)return-1;return a.m.score-b.m.score;});
    hideProg(); renderResults(res,loc);
  } catch(e) {
    if(!ctrl.signal.aborted){hideProg();showErr(`Laden fehlgeschlagen: ${e.message}`);}
  } finally {
    if(!ctrl.signal.aborted) document.getElementById('goBtn').disabled=false;
  }
}

function handleGo() {
  const p=parseCoords(document.getElementById('coordInput').value);
  if(!p){showErr("Ungültige Koordinaten — z.B. 46.6863, 7.8528 oder (39.52, -9.13)");return;}
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  runAnalysis(p.lat,p.lon,`${p.lat.toFixed(2)}°, ${p.lon.toFixed(2)}°`);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
