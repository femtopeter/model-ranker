<title>🪂 Model Ranker</title>

<style>
:root{--bg:#0a0f1c;--bg2:#0d1528;--card:rgba(15,23,42,.4);--card2:rgba(30,41,59,.8);--brd:#1e293b;--brd2:rgba(100,160,255,.08);--t:#e2e8f0;--t2:#94a3b8;--t3:#64748b;--t4:#475569;--grn:#4ade80;--grn2:#86efac;--blu:#3b82f6;--pur:#a78bfa;--red:#f87171;--mono:'JetBrains Mono',monospace;--sans:'DM Sans','Segoe UI',system-ui,sans-serif;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{min-height:100%;background:linear-gradient(145deg,var(--bg) 0%,var(--bg2) 40%,#111d35 100%);color:var(--t);font-family:var(--sans);-webkit-font-smoothing:antialiased;padding-top:var(--st);padding-bottom:var(--sb);overscroll-behavior:none}
.hdr{padding:20px 20px 16px;padding-top:calc(20px + var(--st));border-bottom:1px solid var(--brd2);background:linear-gradient(180deg,rgba(30,80,180,.08) 0%,transparent 100%)}
.hdr-r{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.hdr h1{font-size:22px;font-weight:700;margin:0;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr p{font-size:12px;color:var(--t3);margin-top:4px}
.sec{padding:16px 16px 8px}
.lbl{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}

/* Search */
.search-wrap{position:relative;margin-bottom:12px}
.search-input{width:100%;padding:10px 12px 10px 36px;border-radius:10px;border:1px solid var(--brd);background:rgba(15,23,42,.5);color:var(--t);font-size:14px;font-family:var(--sans);outline:none;-webkit-appearance:none}
.search-input:focus{border-color:var(--blu)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--t3);pointer-events:none}

/* Country groups */
.country-group{margin-bottom:12px}
.country-hdr{display:flex;align-items:center;gap:6px;padding:6px 0;font-size:13px;font-weight:600;color:var(--t2);cursor:pointer;-webkit-tap-highlight-color:transparent}
.country-hdr .arrow{font-size:10px;color:var(--t3);transition:transform .2s}
.country-hdr.open .arrow{transform:rotate(90deg)}
.spots{display:none;flex-wrap:wrap;gap:6px;padding:4px 0 4px 2px}
.spots.open{display:flex}
.spot{padding:7px 12px;border-radius:18px;border:1px solid var(--brd);background:rgba(15,23,42,.6);color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--sans);-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:all .15s}
.spot:active{transform:scale(.96)}
.spot.active{border-color:var(--blu);background:rgba(59,130,246,.15);color:#93c5fd}
.spot.hidden{display:none}

/* Coord input */
.coord-row{display:flex;gap:8px;align-items:center;padding:10px 12px;border-radius:12px;background:rgba(15,23,42,.5);border:1px solid var(--brd);margin-top:12px}
.coord-in{flex:1;padding:10px 12px;border-radius:8px;border:1px solid var(--brd);background:var(--bg);color:var(--t);font-size:14px;font-family:var(--mono);outline:none;-webkit-appearance:none}
.coord-in:focus{border-color:var(--blu)}
.go{padding:10px 20px;border-radius:8px;background:linear-gradient(135deg,#2563eb,#7c3aed);border:none;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);-webkit-tap-highlight-color:transparent;touch-action:manipulation;white-space:nowrap}
.go:active{transform:scale(.96)}
.go:disabled{background:#334155;cursor:not-allowed}

/* Feedback */
.err{margin:12px 16px;padding:12px 14px;border-radius:10px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;font-size:13px}
.prog{padding:24px 16px;text-align:center}
.prog-bar{width:100%;height:4px;background:var(--brd);border-radius:2px;overflow:hidden;margin-bottom:12px}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blu),var(--pur));transition:width .3s}

/* Results */
.res{padding:12px 16px;padding-bottom:calc(80px + var(--sb))}
.hero{padding:18px;border-radius:14px;background:linear-gradient(135deg,rgba(34,197,94,.08),rgba(59,130,246,.08));border:1px solid rgba(34,197,94,.2);margin-bottom:16px}
.hero-l{font-size:11px;color:var(--grn);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.hero-n{font-size:20px;font-weight:700;color:#f0fdf4;margin-bottom:2px}
.hero-s{font-size:12px;color:var(--grn2)}
.hero-m{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap}
.hero-ml{color:var(--t3);font-size:12px;display:block}
.hero-mv{font-size:16px;font-weight:600;color:var(--t);font-family:var(--mono)}
.hero-mu{font-size:11px;color:var(--t3)}
.hero-note{font-size:11px;color:var(--t4);margin-top:10px}

.mc{padding:12px 14px;border-radius:12px;background:var(--card);border:1px solid var(--brd);margin-bottom:6px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s}
.mc:active{transform:scale(.995)}
.mc.r1{border-color:rgba(34,197,94,.2)}
.mc.exp{background:var(--card2)}
.mr{display:flex;align-items:center;gap:10px}
.rb{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;font-weight:700;flex-shrink:0}
.rb1{background:#FFD700;font-size:16px}.rb2{background:#C0C0C0;font-size:16px}.rb3{background:#CD7F32;font-size:16px}
.rbo{background:#1e2a3a;color:#888;font-size:13px;border:1px solid #334155}
.mi{flex:1;min-width:0}
.mn{font-size:14px;font-weight:600}
.mn.hd{color:var(--t)}.mn.nd{color:var(--t4)}
.mt{font-size:10px;color:#8b5cf6;margin-left:6px;font-weight:500}
.ms{font-size:11px;color:var(--t4);margin-top:1px}
.mv{text-align:right;flex-shrink:0}
.mvv{font-size:13px;font-weight:600;font-family:var(--mono);color:var(--t)}
.mvu{font-size:10px;color:var(--t3)}
.me{font-size:11px;flex-shrink:0}
.sb{width:100%;height:6px;background:#1e2a3a;border-radius:3px;overflow:hidden;margin-top:8px}
.sf{height:100%;border-radius:3px;transition:width .6s ease-out}
.dg{margin-top:12px;padding-top:12px;border-top:1px solid var(--brd2);display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;font-size:12px}
.dl{color:var(--t3);font-size:10px;margin-bottom:2px}
.dv{font-family:var(--mono);font-weight:500}
.dn{grid-column:1/-1;font-size:11px;color:var(--t4)}
.meth{margin-top:16px;padding:12px 14px;border-radius:12px;background:rgba(15,23,42,.3);border:1px solid var(--brd);font-size:11px;color:var(--t4);line-height:1.6}
.meth b{font-weight:600;color:var(--t3)}
.ts{font-size:11px;color:var(--t4);text-align:center;margin-top:12px}
.empty{padding:48px 24px;text-align:center;color:var(--t4);font-size:14px}
.empty-i{font-size:40px;margin-bottom:12px}
</style>
</head>

// ========== MODELS ==========
const MODELS=[

let currentAbort=null, activeSpot=null;

// ========== BUILD SPOT LIST ==========
function buildSpots(){
  const el=document.getElementById('spotList');
  const groups={};
  SPOTS.forEach(s=>{if(!groups[s.c])groups[s.c]=[];groups[s.c].push(s);});
  let html='';
  CORDER.forEach(c=>{
    if(!groups[c])return;
    html+=`<div class="country-group" data-country="${c}">
      <div class="country-hdr" onclick="toggleCountry('${c}')">
        <span class="arrow">▶</span> ${FLAGS[c]||''} ${CNAMES[c]||c} <span style="color:var(--t4);font-weight:400;font-size:11px;margin-left:4px">(${groups[c].length})</span>
      </div>
      <div class="spots" id="spots-${c}">
        ${groups[c].map((s,i)=>`<button class="spot" data-idx="${SPOTS.indexOf(s)}" onclick="pickSpot(${SPOTS.indexOf(s)})">${s.n}</button>`).join('')}
      </div>
    </div>`;
  });
  el.innerHTML=html;
  // Open first country by default
  toggleCountry('CH');
}

function toggleCountry(c){
  const hdr=document.querySelector(`.country-group[data-country="${c}"] .country-hdr`);
  const spots=document.getElementById('spots-'+c);
  if(!hdr||!spots)return;
  const open=spots.classList.contains('open');
  spots.classList.toggle('open');
  hdr.classList.toggle('open');
}

// ========== SEARCH ==========
document.getElementById('search').addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  document.querySelectorAll('.spot').forEach(b=>{
    const idx=parseInt(b.dataset.idx);
    const s=SPOTS[idx];
    const match=!q||s.n.toLowerCase().includes(q)||s.c.toLowerCase().includes(q)||(CNAMES[s.c]||'').toLowerCase().includes(q);
    b.classList.toggle('hidden',!match);
  });
  // Auto-open countries with matches
  document.querySelectorAll('.country-group').forEach(g=>{
    const c=g.dataset.country;
    const hasVisible=g.querySelectorAll('.spot:not(.hidden)').length>0;
    const spots=document.getElementById('spots-'+c);
    const hdr=g.querySelector('.country-hdr');
    if(q&&hasVisible){spots.classList.add('open');hdr.classList.add('open');}
    if(q&&!hasVisible){spots.classList.remove('open');hdr.classList.remove('open');}
  });
});

function pickSpot(idx){
  const s=SPOTS[idx];
  document.querySelectorAll('.spot').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.spot[data-idx="${idx}"]`)?.classList.add('active');
  activeSpot=s;
  document.getElementById('coordIn').value=`${s.lat}, ${s.lon}`;
  runAnalysis(s.lat,s.lon,s.n);
}

document.getElementById('coordIn').addEventListener('keydown',e=>{if(e.key==='Enter')handleGo();});

// ========== HELPERS ==========
function getModels(lat,lon){
  return MODELS.filter(m=>{
    if(m.scope==='global')return true;
    if(m.b)return lat>=m.b.la&&lat<=m.b.lx&&lon>=m.b.lo&&lon<=m.b.lox;
    return false;
  });
}
function wde(f,o){let d=Math.abs(f-o);return d>180?360-d:d;}
function metrics(fc,gt){
  if(!fc?.time||!gt?.time)return null;
  const om={};gt.time.forEach((t,i)=>{om[t]={ws:gt.wind_speed_10m?.[i],wd:gt.wind_direction_10m?.[i],wg:gt.wind_gusts_10m?.[i]};});
  let sE=[],dE=[],gE=[],n=0;
  fc.time.forEach((t,i)=>{
    const o=om[t];if(!o)return;
    const fs=fc.wind_speed_10m?.[i],fd=fc.wind_direction_10m?.[i],fg=fc.wind_gusts_10m?.[i];
    if(fs!=null&&o.ws!=null&&!isNaN(fs)&&!isNaN(o.ws))sE.push((fs-o.ws)**2);
    if(fd!=null&&o.wd!=null&&!isNaN(fd)&&!isNaN(o.wd))dE.push(wde(fd,o.wd)**2);
    if(fg!=null&&o.wg!=null&&!isNaN(fg)&&!isNaN(o.wg))gE.push((fg-o.wg)**2);
    n++;
  });
  if(n<2)return null;
  const r=a=>a.length>0?Math.sqrt(a.reduce((x,y)=>x+y,0)/a.length):null;
  const sR=r(sE),dR=r(dE),gR=r(gE);
  let c=0,w=0;
  if(sR!=null){c+=sR*.4;w+=.4;}if(gR!=null){c+=gR*.15;w+=.15;}if(dR!=null){c+=(dR/10)*.45;w+=.45;}
  return{speedRMSE:sR,dirRMSE:dR,gustRMSE:gR,score:w>0?c/w:null,matched:n};
}
function parseCoords(v){
  const c=v.trim().replace(/[()]/g,'').trim();
  const m=c.match(/^([+-]?\d+\.?\d*)[,\s]+([+-]?\d+\.?\d*)$/);
  if(!m)return null;
  const lat=parseFloat(m[1]),lon=parseFloat(m[2]);
  if(isNaN(lat)||isNaN(lon)||lat<-90||lat>90||lon<-180||lon>180)return null;
  return{lat,lon};
}

// ========== API ==========
async function fj(url){const r=await fetch(url);if(!r.ok)throw new Error(`HTTP ${r.status}`);const d=await r.json();if(d.error)throw new Error(d.reason||'API error');return d;}
async function fetchGT(lat,lon){return(await fj(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m&past_hours=24&forecast_hours=0&wind_speed_unit=kmh&timezone=auto`)).hourly;}
async function fetchM(lat,lon,id){
  try{
    const d=await fj(`https://previous-runs-api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=wind_speed_10m_previous_day1,wind_direction_10m_previous_day1,wind_gusts_10m_previous_day1&models=${id}&past_hours=24&forecast_hours=0&wind_speed_unit=kmh&timezone=auto`);
    const h=d.hourly;
    if(h?.time&&h.wind_speed_10m_previous_day1?.some(v=>v!=null))
      return{time:h.time,wind_speed_10m:h.wind_speed_10m_previous_day1,wind_direction_10m:h.wind_direction_10m_previous_day1,wind_gusts_10m:h.wind_gusts_10m_previous_day1};
  }catch(_){}
  const d=await fj(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m&models=${id}&past_hours=24&forecast_hours=0&wind_speed_unit=kmh&timezone=auto`);
  if(!d.hourly?.time||!d.hourly.wind_speed_10m?.some(v=>v!=null))throw new Error('No data');
  return d.hourly;
}

// ========== UI ==========
function showErr(m){const e=document.getElementById('errBox');e.textContent=m;e.style.display='block';}
function hideErr(){document.getElementById('errBox').style.display='none';}
function showProg(s,d,t){document.getElementById('progWrap').style.display='block';document.getElementById('progFill').style.width=`${(d/Math.max(t,1))*100}%`;document.getElementById('progStat').textContent=s;document.getElementById('progCnt').textContent=`${d} / ${t}`;}
function hideProg(){document.getElementById('progWrap').style.display='none';}

function renderResults(res,loc){
  const el=document.getElementById('results');
  const ranked=res.filter(r=>r.m);
  const mx=ranked.length>0?Math.max(...ranked.map(r=>r.m.score),1):1;
  const best=ranked[0];
  const now=new Date().toLocaleString('de-CH',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  let h='';
  if(best){
    const m=best.m;
    h+=`<div class="hero"><div class="hero-l">✦ Bestes Modell für ${loc}</div>
    <div class="hero-n">${best.mod.name}</div>
    <div class="hero-s">${best.mod.prov} · ${best.mod.res} · Update alle ${best.mod.upd}</div>
    <div class="hero-m">
      <div><span class="hero-ml">Wind</span><div class="hero-mv">${m.speedRMSE?.toFixed(1)??'–'} <span class="hero-mu">km/h</span></div></div>
      <div><span class="hero-ml">Richtung</span><div class="hero-mv">${m.dirRMSE?.toFixed(0)??'–'}<span class="hero-mu">°</span></div></div>
      <div><span class="hero-ml">Böen</span><div class="hero-mv">${m.gustRMSE?.toFixed(1)??'–'} <span class="hero-mu">km/h</span></div></div>
    </div>
    <div class="hero-note">${m.matched} Vergleichspunkte (letzte 24h)</div></div>`;
  }
  h+=`<div class="lbl">Ranking — ${ranked.length} von ${res.length} Modellen</div>`;
  res.forEach(r=>{
    const rank=r.m?ranked.indexOf(r)+1:null;
    const rc=rank&&rank<=3?`rb rb${rank}`:'rb rbo';
    const rl=rank?(rank<=3?['🥇','🥈','🥉'][rank-1]:rank):'—';
    const pct=r.m?Math.min((r.m.score/mx)*100,100):0;
    const hue=Math.max(0,120-pct*1.2);
    h+=`<div class="mc${rank===1?' r1':''}" id="c-${r.mod.id}" onclick="tog('${r.mod.id}')">
      <div class="mr"><span class="${rc}">${rl}</span>
        <div class="mi"><div class="mn ${r.m?'hd':'nd'}">${r.mod.name}${r.mod.note?`<span class="mt">${r.mod.note}</span>`:''}</div><div class="ms">${r.mod.prov} · ${r.mod.res}</div></div>
        ${r.m?`<div class="mv"><div class="mvv">${r.m.speedRMSE?.toFixed(1)??'–'}</div><div class="mvu">km/h RMSE</div></div>`:''}
        ${!r.m?`<div class="me" style="color:${r.err?'var(--red)':'var(--t4)'}">${r.err?'Fehler':'—'}</div>`:''}
      </div>
      ${r.m?`<div class="sb"><div class="sf" style="width:${pct}%;background:hsl(${hue},70%,50%)"></div></div>`:''}
      <div class="dg" id="d-${r.mod.id}" style="display:none">
        ${r.m?`<div><div class="dl">Wind</div><div class="dv">${r.m.speedRMSE?.toFixed(2)??'–'} km/h</div></div>
        <div><div class="dl">Richtung</div><div class="dv">${r.m.dirRMSE?.toFixed(1)??'–'}°</div></div>
        <div><div class="dl">Böen</div><div class="dv">${r.m.gustRMSE?.toFixed(2)??'–'} km/h</div></div>
        <div class="dn">${r.m.matched} Punkte · Update: ${r.mod.upd}</div>`:''}
        ${r.err?`<div class="dn" style="color:var(--red)">${r.err}</div>`:''}
      </div></div>`;
  });
  h+=`<div class="meth"><b>Methodik</b><br>Ground Truth: Open-Meteo "Best Match" (assimiliert). Prognose: Previous Day 1 (Fallback: aktuelle Modelldaten).<br>Score: RMSE gewichtet — Wind 40%, Richtung 45%, Böen 15%.<br>Quelle: <a href="https://open-meteo.com" style="color:var(--blu)">Open-Meteo API</a></div>`;
  h+=`<div class="ts">Stand: ${now}</div>`;
  el.innerHTML=h;el.style.display='block';
}

function tog(id){
  const d=document.getElementById('d-'+id);if(!d)return;
  d.style.display=d.style.display==='none'?'grid':'none';
  document.getElementById('c-'+id)?.classList.toggle('exp');
}

// ========== MAIN ==========
async function runAnalysis(lat,lon,loc){
  if(currentAbort)currentAbort.abort();
  const ctrl=new AbortController();currentAbort=ctrl;
  hideErr();document.getElementById('results').style.display='none';document.getElementById('empty').style.display='none';
  document.getElementById('goBtn').disabled=true;
  try{
    showProg('Ground-Truth laden…',0,1);
    const gt=await fetchGT(lat,lon);if(ctrl.signal.aborted)return;
    const mods=getModels(lat,lon);const res=[];
    for(let i=0;i<mods.length;i++){
      if(ctrl.signal.aborted)return;
      showProg(`${mods[i].name}…`,i+1,mods.length);
      try{const fc=await fetchM(lat,lon,mods[i].id);res.push({mod:mods[i],m:metrics(fc,gt),err:null});}
      catch(e){res.push({mod:mods[i],m:null,err:e.message});}
      await new Promise(r=>setTimeout(r,80));
    }
    if(ctrl.signal.aborted)return;
    res.sort((a,b)=>{if(!a.m&&!b.m)return 0;if(!a.m)return 1;if(!b.m)return-1;return a.m.score-b.m.score;});
    hideProg();renderResults(res,loc);
  }catch(e){
    if(!ctrl.signal.aborted){hideProg();showErr(`Laden fehlgeschlagen: ${e.message}`);}
  }finally{if(!ctrl.signal.aborted)document.getElementById('goBtn').disabled=false;}
}

function handleGo(){
  const p=parseCoords(document.getElementById('coordIn').value);
  if(!p){showErr("Ungültige Koordinaten — z.B. 46.68, 7.85 oder (39.52, -9.13)");return;}
  document.querySelectorAll('.spot').forEach(b=>b.classList.remove('active'));
  runAnalysis(p.lat,p.lon,`${p.lat.toFixed(2)}°, ${p.lon.toFixed(2)}°`);
}

// ========== INIT ==========
buildSpots();
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
